<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Max Up - Only Up風クライミング</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #0b1020;
    font-family: -apple-system, "Hiragino Kaku Gothic ProN", "Yu Gothic", Meiryo, sans-serif;
    -webkit-user-select: none; user-select: none; touch-action: none; }
  #game { display: block; width: 100%; height: 100%; cursor: grab; }

  /* HUD */
  #hud { position: fixed; top: 14px; left: 14px; color: #fff; pointer-events: none;
    text-shadow: 0 2px 8px rgba(0,0,0,.55); z-index: 5; }
  #hud .big { font-size: 30px; font-weight: 800; letter-spacing: .5px; }
  #hud .sub { font-size: 13px; opacity: .85; margin-top: 2px; }
  #stars { position: fixed; top: 14px; right: 16px; color: #ffe27a; font-size: 18px;
    font-weight: 700; text-shadow: 0 2px 8px rgba(0,0,0,.55); z-index: 5; }

  /* center toast */
  #toast { position: fixed; top: 38%; left: 0; right: 0; text-align: center; color: #fff;
    font-size: 26px; font-weight: 800; opacity: 0; transition: opacity .25s;
    text-shadow: 0 3px 12px rgba(0,0,0,.6); z-index: 6; pointer-events: none; }

  /* overlays */
  .overlay { position: fixed; inset: 0; display: flex; flex-direction: column;
    align-items: center; justify-content: center; text-align: center; color: #fff;
    background: radial-gradient(120% 120% at 50% 0%, rgba(30,58,138,.55), rgba(8,12,30,.92));
    z-index: 10; padding: 24px; }
  .overlay h1 { font-size: clamp(32px, 8vw, 64px); font-weight: 900; letter-spacing: 1px;
    background: linear-gradient(90deg,#93c5fd,#c4b5fd,#fbcfe8); -webkit-background-clip: text;
    background-clip: text; color: transparent; }
  .overlay p { max-width: 420px; line-height: 1.7; font-size: 15px; opacity: .92; margin-top: 14px; }
  .keys { margin-top: 18px; display: flex; gap: 18px; flex-wrap: wrap; justify-content: center;
    font-size: 13px; opacity: .85; }
  .keys b { display: inline-block; background: rgba(255,255,255,.12); border: 1px solid rgba(255,255,255,.2);
    border-radius: 7px; padding: 3px 9px; margin-right: 6px; font-weight: 700; }
  button.cta { margin-top: 26px; padding: 14px 34px; font-size: 17px; font-weight: 800;
    border: none; border-radius: 999px; cursor: pointer; color: #0b1020;
    background: linear-gradient(90deg,#a5b4fc,#f0abfc); box-shadow: 0 10px 30px rgba(160,120,255,.4);
    transition: transform .12s; }
  button.cta:active { transform: scale(.96); }
  .hide { display: none !important; }

  /* settings */
  #gear { position: fixed; top: 12px; right: 12px; z-index: 8; width: 40px; height: 40px;
    border-radius: 12px; background: rgba(15,20,40,.55); border: 1px solid rgba(255,255,255,.18);
    color: #fff; font-size: 20px; cursor: pointer; display: flex; align-items: center;
    justify-content: center; backdrop-filter: blur(6px); transition: transform .15s, background .15s; }
  #gear:hover { background: rgba(30,40,70,.7); }
  #gear.open { transform: rotate(60deg); }
  #panel { position: fixed; top: 60px; right: 12px; z-index: 8; width: 232px;
    background: rgba(12,17,35,.82); border: 1px solid rgba(255,255,255,.16); border-radius: 14px;
    padding: 14px 16px 16px; color: #e8edff; backdrop-filter: blur(10px);
    box-shadow: 0 14px 40px rgba(0,0,0,.4); }
  #panel h3 { font-size: 12px; letter-spacing: 1px; text-transform: uppercase; opacity: .6;
    margin-bottom: 10px; font-weight: 800; }
  #panel .row { margin-bottom: 13px; }
  #panel label { display: flex; justify-content: space-between; font-size: 12.5px; margin-bottom: 5px; opacity: .9; }
  #panel label span { font-variant-numeric: tabular-nums; opacity: .7; }
  #panel input[type=range] { width: 100%; accent-color: #a5b4fc; height: 4px; }
  #panel .chk { display: flex; align-items: center; gap: 8px; font-size: 12.5px; cursor: pointer; }
  #panel .chk input { accent-color: #a5b4fc; width: 16px; height: 16px; }
  #panel .note { font-size: 11px; line-height: 1.6; opacity: .6; margin-top: 4px;
    border-top: 1px solid rgba(255,255,255,.1); padding-top: 10px; }
  #panel .note b { color: #c4b5fd; }

  /* mobile controls */
  #mobile { position: fixed; inset: 0; z-index: 4; display: none; pointer-events: none; }
  #stick { position: absolute; left: 26px; bottom: 30px; width: 130px; height: 130px;
    border-radius: 50%; background: rgba(255,255,255,.08); border: 2px solid rgba(255,255,255,.18);
    pointer-events: auto; }
  #knob { position: absolute; left: 40px; top: 40px; width: 50px; height: 50px; border-radius: 50%;
    background: rgba(255,255,255,.45); }
  #jump { position: absolute; right: 30px; bottom: 44px; width: 92px; height: 92px; border-radius: 50%;
    background: rgba(165,180,252,.35); border: 2px solid rgba(255,255,255,.35); color: #fff;
    font-weight: 800; font-size: 16px; pointer-events: auto; display: flex; align-items: center;
    justify-content: center; }
</style>
</head>
<body>
<canvas id="game"></canvas>

<div id="hud" class="hide">
  <div class="big"><span id="height">0.0</span> m</div>
  <div class="sub">ベスト <span id="best">0.0</span> m ・ <span id="time">0:00</span></div>
  <div class="sub" id="stars">★ <span id="starcount">0</span></div>
</div>
<div id="toast"></div>

<button id="gear" title="設定">⚙</button>
<div id="panel" class="hide">
  <h3>設定</h3>
  <div class="row">
    <label>マウス感度 <span id="sensVal">1.0×</span></label>
    <input type="range" id="sens" min="0.2" max="3" step="0.1" value="1">
  </div>
  <div class="row">
    <label>視点距離 <span id="distVal">8</span></label>
    <input type="range" id="dist" min="4" max="16" step="0.5" value="8">
  </div>
  <div class="row">
    <label>視野角 (FOV) <span id="fovVal">62°</span></label>
    <input type="range" id="fov" min="50" max="85" step="1" value="62">
  </div>
  <div class="row">
    <label class="chk"><input type="checkbox" id="invertY"> Y軸を反転</label>
  </div>
  <div class="note"><b>Shift</b> を押している間はマウスの動きで視点が回ります（フリールック）。通常はドラッグ／矢印キー。</div>
</div>

<div id="mobile">
  <div id="stick"><div id="knob"></div></div>
  <div id="jump">JUMP</div>
</div>

<div id="startScreen" class="overlay">
  <h1>MAX UP</h1>
  <p>とにかく上へ。足場を飛び移って空の頂上を目指す登山ゲーム。<br>
     ただし――落ちたらスタートまで逆戻り。慎重に、でも大胆に。</p>
  <div class="keys" id="keyHints">
    <div><b>W A S D</b>移動</div>
    <div><b>SPACE</b>ジャンプ</div>
    <div><b>ドラッグ / 矢印</b>視点</div>
    <div><b>Shift</b>マウス追従</div>
  </div>
  <button class="cta" id="startBtn">クライム開始</button>
</div>

<div id="winScreen" class="overlay hide">
  <h1>🏔 登頂！</h1>
  <p>頂上に到達しました。<br>
     タイム <b id="winTime" style="background:none;border:none;padding:0">0:00</b>　
     スター <b id="winStars" style="background:none;border:none;padding:0">0</b></p>
  <button class="cta" id="againBtn">もう一度</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
(function () {
  "use strict";

  // ---------- constants ----------
  var G = 26;          // gravity
  var JUMP = 12.2;     // jump velocity (max height ~2.86)
  var SPEED = 7.5;     // horizontal move speed
  var R = 0.6;         // player collision radius
  var COYOTE = 0.10;   // coyote time
  var BUFFER = 0.12;   // jump buffer
  var NUM = 42;        // number of platforms

  // ---------- globals ----------
  var scene, camera, renderer, clock;
  var canvas = document.getElementById("game");
  var platforms = [];
  var stars = [];
  var goalPlatform = null;
  var playerGroup, eyesL, eyesR;
  var startPos = new THREE.Vector3(0, 2.5, 0);

  var player = {
    pos: new THREE.Vector3(),
    vel: new THREE.Vector3(),
    onGround: false,
    coyote: 0,
    buffer: 0,
    riding: null
  };

  var cam = { yaw: 0, pitch: 0.32, dist: 8 };
  var settings = { sens: 1, invertY: false, fov: 62 };
  var keys = {};
  var state = "menu"; // menu | play | win
  var maxHeight = 0, bestHeight = 0, starCount = 0, startTime = 0;
  var pointerLocked = false;
  var isTouch = ("ontouchstart" in window) || navigator.maxTouchPoints > 0;

  // ---------- init ----------
  function init() {
    scene = new THREE.Scene();
    scene.fog = new THREE.Fog(0x9fc0f0, 40, 160);

    camera = new THREE.PerspectiveCamera(62, window.innerWidth / window.innerHeight, 0.1, 1200);

    renderer = new THREE.WebGLRenderer({ canvas: canvas, antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;

    // sky dome
    var skyGeo = new THREE.SphereGeometry(600, 32, 16);
    var skyMat = new THREE.ShaderMaterial({
      side: THREE.BackSide,
      uniforms: {
        top: { value: new THREE.Color(0x1e3a8a) },
        bottom: { value: new THREE.Color(0xbfdbfe) },
        offset: { value: 40 }, exponent: { value: 0.55 }
      },
      vertexShader:
        "varying vec3 vP; void main(){ vec4 w=modelMatrix*vec4(position,1.0); vP=w.xyz; gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0);}",
      fragmentShader:
        "uniform vec3 top; uniform vec3 bottom; uniform float offset; uniform float exponent; varying vec3 vP; void main(){ float h=normalize(vP+vec3(0.0,offset,0.0)).y; gl_FragColor=vec4(mix(bottom,top,pow(max(h,0.0),exponent)),1.0);}"
    });
    scene.add(new THREE.Mesh(skyGeo, skyMat));

    // lights
    scene.add(new THREE.AmbientLight(0xb8c8ff, 0.75));
    var sun = new THREE.DirectionalLight(0xfff2d8, 1.05);
    sun.position.set(30, 80, 20);
    sun.castShadow = true;
    sun.shadow.mapSize.set(2048, 2048);
    sun.shadow.camera.near = 1; sun.shadow.camera.far = 260;
    sun.shadow.camera.left = -60; sun.shadow.camera.right = 60;
    sun.shadow.camera.top = 60; sun.shadow.camera.bottom = -60;
    sun.shadow.bias = -0.0004;
    scene.add(sun);
    sunRef = sun;

    buildCourse();
    buildPlayer();
    buildClouds();

    bindEvents();
    onResize();
    clock = new THREE.Clock();
    animate();
  }
  var sunRef;

  // ---------- course ----------
  function buildCourse() {
    // start platform
    addPlatform(0, 0.8, 0, 4, 0.5, 4, new THREE.Color(0x6b7280), null, false);

    var angle = 0, y = 0.8;
    for (var i = 0; i < NUM; i++) {
      var t = i / NUM;
      angle += 0.72 + 0.45 * t;
      var radius = 6.2 - 1.6 * t;
      var size = 2.7 - 1.2 * t;
      var vstep = 1.8 + 0.5 * t;
      y += vstep;
      var x = Math.cos(angle) * radius;
      var z = Math.sin(angle) * radius;

      var col = new THREE.Color().setHSL(0.62 - 0.62 * t, 0.62, 0.6);
      var mover = null;
      if (i > 14 && i % 5 === 0) {
        // sideways moving platform (tangential)
        mover = { amp: 1.6, speed: 0.9 + Math.random() * 0.4, phase: Math.random() * 6.28,
                  ax: Math.cos(angle + Math.PI / 2), az: Math.sin(angle + Math.PI / 2),
                  bx: x, bz: z };
      }
      addPlatform(x, y, z, size, 0.5, size, col, mover, false);

      // a star every 5th platform
      if (i % 5 === 2) addStar(x, y + 1.6, z);
    }

    // goal platform on top
    angle += 0.7;
    y += 2.4;
    var gx = Math.cos(angle) * 3.5, gz = Math.sin(angle) * 3.5;
    goalPlatform = addPlatform(gx, y, gz, 3.4, 0.5, 3.4, new THREE.Color(0xfcd34d), null, true);

    // goal beam (visible from below)
    var beam = new THREE.Mesh(
      new THREE.CylinderGeometry(0.6, 0.6, 120, 16, 1, true),
      new THREE.MeshBasicMaterial({ color: 0xfff0a0, transparent: true, opacity: 0.18, side: THREE.DoubleSide, depthWrite: false })
    );
    beam.position.set(gx, y + 60, gz);
    scene.add(beam);
    var flag = new THREE.Mesh(
      new THREE.TorusGeometry(0.9, 0.16, 12, 32),
      new THREE.MeshStandardMaterial({ color: 0xfde68a, emissive: 0xffcc33, emissiveIntensity: 0.7, metalness: 0.4, roughness: 0.3 })
    );
    flag.position.set(gx, y + 1.4, gz);
    flag.userData.spin = true;
    scene.add(flag);
    spinners.push(flag);
  }
  var spinners = [];

  function addPlatform(x, y, z, sx, sy, sz, color, mover, isGoal) {
    var mat = new THREE.MeshStandardMaterial({ color: color, roughness: 0.85, metalness: 0.05 });
    if (isGoal) { mat.emissive = new THREE.Color(0xffcc33); mat.emissiveIntensity = 0.35; }
    var mesh = new THREE.Mesh(new THREE.BoxGeometry(sx, sy, sz), mat);
    mesh.position.set(x, y, z);
    mesh.castShadow = true;
    mesh.receiveShadow = true;
    scene.add(mesh);
    var p = {
      mesh: mesh,
      c: new THREE.Vector3(x, y, z),
      h: new THREE.Vector3(sx / 2, sy / 2, sz / 2),
      mover: mover, delta: new THREE.Vector3(), isGoal: isGoal
    };
    platforms.push(p);
    return p;
  }

  function addStar(x, y, z) {
    var m = new THREE.Mesh(
      new THREE.OctahedronGeometry(0.45),
      new THREE.MeshStandardMaterial({ color: 0xffe27a, emissive: 0xffcc33, emissiveIntensity: 0.85, metalness: 0.5, roughness: 0.2 })
    );
    m.position.set(x, y, z);
    m.castShadow = true;
    scene.add(m);
    stars.push({ mesh: m, pos: new THREE.Vector3(x, y, z), got: false, base: y });
  }

  function buildClouds() {
    var mat = new THREE.MeshStandardMaterial({ color: 0xffffff, transparent: true, opacity: 0.85, roughness: 1 });
    for (var i = 0; i < 16; i++) {
      var g = new THREE.Group();
      var n = 3 + Math.floor(Math.random() * 3);
      for (var j = 0; j < n; j++) {
        var s = new THREE.Mesh(new THREE.SphereGeometry(2 + Math.random() * 2, 10, 8), mat);
        s.position.set((Math.random() - 0.5) * 6, (Math.random() - 0.5) * 1.5, (Math.random() - 0.5) * 6);
        s.scale.y = 0.5;
        g.add(s);
      }
      var ang = Math.random() * 6.28, rad = 25 + Math.random() * 60;
      g.position.set(Math.cos(ang) * rad, 5 + Math.random() * 100, Math.sin(ang) * rad);
      scene.add(g);
    }
  }

  // ---------- player ----------
  function buildPlayer() {
    playerGroup = new THREE.Group();
    var body = new THREE.Mesh(
      new THREE.SphereGeometry(R, 24, 18),
      new THREE.MeshStandardMaterial({ color: 0xff8a5c, roughness: 0.45, metalness: 0.1, emissive: 0x331100, emissiveIntensity: 0.25 })
    );
    body.castShadow = true;
    playerGroup.add(body);

    var eyeMat = new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.3 });
    var pupMat = new THREE.MeshStandardMaterial({ color: 0x101020 });
    eyesL = makeEye(eyeMat, pupMat); eyesR = makeEye(eyeMat, pupMat);
    eyesL.position.set(-0.22, 0.12, R - 0.05);
    eyesR.position.set(0.22, 0.12, R - 0.05);
    playerGroup.add(eyesL); playerGroup.add(eyesR);

    scene.add(playerGroup);
  }
  function makeEye(eyeMat, pupMat) {
    var g = new THREE.Group();
    var e = new THREE.Mesh(new THREE.SphereGeometry(0.16, 12, 10), eyeMat);
    var p = new THREE.Mesh(new THREE.SphereGeometry(0.08, 10, 8), pupMat);
    p.position.z = 0.11; g.add(e); g.add(p); return g;
  }

  // ---------- events ----------
  function bindEvents() {
    window.addEventListener("resize", onResize);
    document.addEventListener("keydown", function (e) {
      keys[e.code] = true;
      if (e.code === "Space") { player.buffer = BUFFER; e.preventDefault(); }
      if (["ArrowUp","ArrowDown","ArrowLeft","ArrowRight"].indexOf(e.code) >= 0) e.preventDefault();
    });
    document.addEventListener("keyup", function (e) { keys[e.code] = false; });

    document.getElementById("startBtn").addEventListener("click", startGame);
    document.getElementById("againBtn").addEventListener("click", startGame);

    // mouse look — drag, plus Shift free-look (no pointer lock needed)
    var dragging = false, lastMX = 0, lastMY = 0;
    function applyLook(dx, dy) {
      var s = 0.005 * settings.sens;
      cam.yaw -= dx * s;
      cam.pitch -= dy * s * (settings.invertY ? -1 : 1);
      cam.pitch = Math.max(-0.25, Math.min(1.2, cam.pitch));
    }
    canvas.addEventListener("mousedown", function (e) {
      if (state !== "play") return;
      dragging = true; lastMX = e.clientX; lastMY = e.clientY;
      canvas.style.cursor = "grabbing";
    });
    window.addEventListener("mouseup", function () { dragging = false; canvas.style.cursor = "grab"; });
    window.addEventListener("mousemove", function (e) {
      if (state !== "play") return;
      var freeLook = keys["ShiftLeft"] || keys["ShiftRight"];
      if (freeLook) {
        // use raw movement delta so no clicking is required
        applyLook(e.movementX || 0, e.movementY || 0);
      } else if (dragging) {
        applyLook(e.clientX - lastMX, e.clientY - lastMY);
        lastMX = e.clientX; lastMY = e.clientY;
      }
    });

    if (isTouch) setupTouch();

    // ----- settings panel -----
    var gear = document.getElementById("gear");
    var panel = document.getElementById("panel");
    gear.addEventListener("click", function () {
      var open = panel.classList.toggle("hide") === false;
      gear.classList.toggle("open", open);
    });
    function bindSlider(id, valId, fmt, fn) {
      var el = document.getElementById(id);
      var lab = document.getElementById(valId);
      function upd() { lab.textContent = fmt(el.value); fn(parseFloat(el.value)); }
      el.addEventListener("input", upd); upd();
    }
    bindSlider("sens", "sensVal", function (v) { return parseFloat(v).toFixed(1) + "×"; },
      function (v) { settings.sens = v; });
    bindSlider("dist", "distVal", function (v) { return v; },
      function (v) { cam.dist = v; });
    bindSlider("fov", "fovVal", function (v) { return v + "°"; },
      function (v) { settings.fov = v; if (camera) { camera.fov = v; camera.updateProjectionMatrix(); } });
    document.getElementById("invertY").addEventListener("change", function (e) {
      settings.invertY = e.target.checked;
    });
  }

  function setupTouch() {
    document.getElementById("keyHints").innerHTML =
      '<div><b>左スティック</b>移動</div><div><b>JUMP</b>ジャンプ</div><div><b>右ドラッグ</b>視点</div>';
    document.getElementById("mobile").style.display = "block";

    var stick = document.getElementById("stick");
    var knob = document.getElementById("knob");
    var stickId = null, sox = 0, soy = 0;
    stick.addEventListener("touchstart", function (e) {
      var t = e.changedTouches[0]; stickId = t.identifier;
      var r = stick.getBoundingClientRect(); sox = r.left + r.width / 2; soy = r.top + r.height / 2;
      e.preventDefault();
    }, { passive: false });
    document.addEventListener("touchmove", function (e) {
      for (var i = 0; i < e.changedTouches.length; i++) {
        var t = e.changedTouches[i];
        if (t.identifier === stickId) {
          var dx = t.clientX - sox, dy = t.clientY - soy;
          var d = Math.min(Math.hypot(dx, dy), 55);
          var a = Math.atan2(dy, dx);
          touchMove.x = (Math.cos(a) * d) / 55;
          touchMove.y = (Math.sin(a) * d) / 55;
          knob.style.left = (40 + Math.cos(a) * d) + "px";
          knob.style.top = (40 + Math.sin(a) * d) + "px";
        }
      }
    }, { passive: false });
    document.addEventListener("touchend", function (e) {
      for (var i = 0; i < e.changedTouches.length; i++) {
        var t = e.changedTouches[i];
        if (t.identifier === stickId) { stickId = null; touchMove.x = 0; touchMove.y = 0;
          knob.style.left = "40px"; knob.style.top = "40px"; }
        if (t.identifier === lookId) lookId = null;
      }
    });

    // right side drag = look
    var lookId = null, lx = 0, ly = 0;
    document.addEventListener("touchstart", function (e) {
      for (var i = 0; i < e.changedTouches.length; i++) {
        var t = e.changedTouches[i];
        if (t.clientX > window.innerWidth * 0.45 && lookId === null && state === "play") {
          var jb = document.getElementById("jump").getBoundingClientRect();
          if (t.clientX >= jb.left && t.clientX <= jb.right && t.clientY >= jb.top && t.clientY <= jb.bottom) continue;
          lookId = t.identifier; lx = t.clientX; ly = t.clientY;
        }
      }
    }, { passive: false });
    document.addEventListener("touchmove", function (e) {
      for (var i = 0; i < e.changedTouches.length; i++) {
        var t = e.changedTouches[i];
        if (t.identifier === lookId) {
          cam.yaw -= (t.clientX - lx) * 0.006;
          cam.pitch -= (t.clientY - ly) * 0.006;
          cam.pitch = Math.max(-0.25, Math.min(1.2, cam.pitch));
          lx = t.clientX; ly = t.clientY;
        }
      }
    }, { passive: false });

    var jump = document.getElementById("jump");
    jump.addEventListener("touchstart", function (e) { player.buffer = BUFFER; e.preventDefault(); }, { passive: false });
  }
  var touchMove = { x: 0, y: 0 };

  function onResize() {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  }

  // ---------- game flow ----------
  function startGame() {
    document.getElementById("startScreen").classList.add("hide");
    document.getElementById("winScreen").classList.add("hide");
    document.getElementById("hud").classList.remove("hide");
    document.getElementById("stars").classList.remove("hide");
    respawn(true);
    maxHeight = 0; starCount = 0;
    for (var i = 0; i < stars.length; i++) { stars[i].got = false; stars[i].mesh.visible = true; }
    document.getElementById("starcount").textContent = "0";
    startTime = performance.now();
    state = "play";
    cam.yaw = 0; cam.pitch = 0.32;
  }

  function respawn(full) {
    player.pos.copy(startPos);
    player.vel.set(0, 0, 0);
    player.onGround = false; player.riding = null;
    if (!full) showToast("落ちた！スタートへ", 1100);
  }

  function showToast(msg, ms) {
    var t = document.getElementById("toast");
    t.textContent = msg; t.style.opacity = "1";
    clearTimeout(t._tid);
    t._tid = setTimeout(function () { t.style.opacity = "0"; }, ms || 900);
  }

  // ---------- update ----------
  function update(dt) {
    // arrow keys rotate camera (works everywhere, no pointer lock needed)
    var ROT = 1.9 * settings.sens;
    var iy = settings.invertY ? -1 : 1;
    if (keys["ArrowLeft"]) cam.yaw += ROT * dt;
    if (keys["ArrowRight"]) cam.yaw -= ROT * dt;
    if (keys["ArrowUp"]) cam.pitch = Math.max(-0.25, Math.min(1.2, cam.pitch + ROT * dt * iy));
    if (keys["ArrowDown"]) cam.pitch = Math.max(-0.25, Math.min(1.2, cam.pitch - ROT * dt * iy));

    // animate movers
    for (var i = 0; i < platforms.length; i++) {
      var p = platforms[i];
      if (!p.mover) { p.delta.set(0, 0, 0); continue; }
      var m = p.mover;
      m.phase += dt * m.speed;
      var off = Math.sin(m.phase) * m.amp;
      var nx = m.bx + m.ax * off, nz = m.bz + m.az * off;
      p.delta.set(nx - p.c.x, 0, nz - p.c.z);
      p.c.x = nx; p.c.z = nz;
      p.mesh.position.set(nx, p.c.y, nz);
    }
    for (var s = 0; s < spinners.length; s++) spinners[s].rotation.z += dt * 1.4;

    // carry on moving platform
    if (player.riding && player.riding.mover) {
      player.pos.x += player.riding.delta.x;
      player.pos.z += player.riding.delta.z;
    }

    // input -> horizontal direction (camera relative)
    var fx = -Math.sin(cam.yaw), fz = -Math.cos(cam.yaw); // forward on xz
    var rx = -fz, rz = fx; // right
    var ix = 0, iz = 0;
    if (keys["KeyW"]) iz += 1;
    if (keys["KeyS"]) iz -= 1;
    if (keys["KeyD"]) ix += 1;
    if (keys["KeyA"]) ix -= 1;
    if (isTouch) { ix += touchMove.x; iz += -touchMove.y; }
    var dx = fx * iz + rx * ix, dz = fz * iz + rz * ix;
    var len = Math.hypot(dx, dz);
    if (len > 1) { dx /= len; dz /= len; }
    player.vel.x = dx * SPEED;
    player.vel.z = dz * SPEED;

    // jump (buffer + coyote)
    if (player.buffer > 0 && (player.onGround || player.coyote > 0)) {
      player.vel.y = JUMP; player.onGround = false; player.coyote = 0; player.buffer = 0;
    } else { player.buffer -= dt; }

    // gravity
    player.vel.y -= G * dt;
    if (player.vel.y < -45) player.vel.y = -45;

    // integrate
    var prevY = player.pos.y;
    player.pos.x += player.vel.x * dt;
    player.pos.y += player.vel.y * dt;
    player.pos.z += player.vel.z * dt;

    // collisions
    player.onGround = false;
    var newRiding = null, bestTop = -Infinity, landP = null;
    for (var k = 0; k < platforms.length; k++) {
      var pl = platforms[k];
      var hx = pl.h.x + R * 0.6, hz = pl.h.z + R * 0.6;
      if (Math.abs(player.pos.x - pl.c.x) < hx && Math.abs(player.pos.z - pl.c.z) < hz) {
        var top = pl.c.y + pl.h.y;
        if (player.vel.y <= 0 && (prevY - R) >= top - 0.2 && (player.pos.y - R) <= top + 0.06) {
          if (top > bestTop) { bestTop = top; landP = pl; }
        }
      }
    }
    if (landP) {
      player.pos.y = bestTop + R; player.vel.y = 0;
      player.onGround = true; newRiding = landP;
    }
    // wall blocking
    for (var w = 0; w < platforms.length; w++) {
      var q = platforms[w]; if (q === landP) continue;
      if (player.pos.y < q.c.y + q.h.y - 0.05 && player.pos.y > q.c.y - q.h.y - R) {
        var ddx = player.pos.x - q.c.x, ddz = player.pos.z - q.c.z;
        var ox = (q.h.x + R) - Math.abs(ddx), oz = (q.h.z + R) - Math.abs(ddz);
        if (ox > 0 && oz > 0) {
          if (ox < oz) { player.pos.x += (ddx >= 0 ? 1 : -1) * ox; player.vel.x = 0; }
          else { player.pos.z += (ddz >= 0 ? 1 : -1) * oz; player.vel.z = 0; }
        }
      }
    }
    player.riding = newRiding;
    player.coyote = player.onGround ? COYOTE : player.coyote - dt;

    // win
    if (newRiding && newRiding.isGoal && state === "play") { winGame(); return; }

    // fell off
    if (player.pos.y < -16) respawn(false);

    // stars
    for (var st = 0; st < stars.length; st++) {
      var star = stars[st]; if (star.got) continue;
      star.mesh.rotation.y += dt * 2;
      star.mesh.position.y = star.base + Math.sin(performance.now() * 0.003 + st) * 0.18;
      if (player.pos.distanceToSquared(star.pos) < 1.4) {
        star.got = true; star.mesh.visible = false; starCount++;
        document.getElementById("starcount").textContent = starCount;
        showToast("★ +1", 600);
      }
    }

    // visuals
    playerGroup.position.copy(player.pos);
    playerGroup.rotation.y = cam.yaw + Math.PI; // face camera

    // camera follow
    var cp = Math.cos(cam.pitch), sp = Math.sin(cam.pitch);
    var camX = player.pos.x + cam.dist * cp * Math.sin(cam.yaw);
    var camY = player.pos.y + cam.dist * sp + 1.4;
    var camZ = player.pos.z + cam.dist * cp * Math.cos(cam.yaw);
    camera.position.set(camX, camY, camZ);
    camera.lookAt(player.pos.x, player.pos.y + 0.6, player.pos.z);

    // sun follows up so shadows stay
    sunRef.position.set(player.pos.x + 30, player.pos.y + 80, player.pos.z + 20);
    sunRef.target.position.copy(player.pos);
    sunRef.target.updateMatrixWorld();

    // HUD
    var h = Math.max(0, player.pos.y - startPos.y);
    if (h > maxHeight) maxHeight = h;
    if (maxHeight > bestHeight) bestHeight = maxHeight;
    document.getElementById("height").textContent = h.toFixed(1);
    document.getElementById("best").textContent = bestHeight.toFixed(1);
    var el = (performance.now() - startTime) / 1000;
    document.getElementById("time").textContent =
      Math.floor(el / 60) + ":" + String(Math.floor(el % 60)).padStart(2, "0");
  }

  function winGame() {
    state = "win";
    if (pointerLocked) document.exitPointerLock();
    var el = (performance.now() - startTime) / 1000;
    document.getElementById("winTime").textContent =
      Math.floor(el / 60) + ":" + String(Math.floor(el % 60)).padStart(2, "0");
    document.getElementById("winStars").textContent = starCount + " / " + stars.length;
    document.getElementById("winScreen").classList.remove("hide");
  }

  // ---------- loop ----------
  function animate() {
    requestAnimationFrame(animate);
    var dt = Math.min(clock.getDelta(), 0.04);
    if (state === "play") update(dt);
    renderer.render(scene, camera);
  }

  init();
})();
</script>
</body>
</html>
